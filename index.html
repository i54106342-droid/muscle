<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>構造的質詢：臨床製圖術</title>
    <style>
        :root {
            --netter-red: #8b0000;
            --gold: #c5a059;
            --paper: #fdfaf7;
            --bg: #0a0a0a;
            --card-bg: #111111;
        }

        /* 強制設定標楷體 */
        * { 
            box-sizing: border-box; 
            font-family: "Kaiti TC", "標楷體", "BiauKai", "Apple LiSung", serif; 
        }

        body {
            margin: 0; background: var(--bg); color: #ddd;
            display: flex; justify-content: center; align-items: center; min-height: 100vh;
        }

        #app { width: 100%; max-width: 550px; padding: 20px; }

        .narrative { font-size: 1rem; color: #888; margin-bottom: 30px; line-height: 2; text-align: justify; }
        h1 { font-weight: 300; font-size: 1.3rem; color: var(--netter-red); letter-spacing: 0.4em; text-align: center; margin: 40px 0; }

        .option-item {
            background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08);
            color: #bbb; padding: 22px; cursor: pointer; text-align: left;
            transition: 0.3s; font-size: 1rem; margin-bottom: 15px; width: 100%; line-height: 1.5;
        }
        .option-item:hover { border-color: var(--netter-red); background: rgba(139, 0, 0, 0.1); color: white; }

        /* 結果卡片區域 */
        #result-card {
            display: none; background: var(--card-bg); border: 1px solid #222;
            padding: 40px 30px; border-radius: 2px; position: relative;
            animation: slideUp 1s ease-out;
        }

        .card-header { text-align: center; margin-bottom: 30px; }
        .star-rating { color: var(--gold); font-size: 0.9rem; letter-spacing: 4px; margin-bottom: 12px; }
        .muscle-latin { font-family: "Times New Roman", serif; font-style: italic; color: var(--netter-red); font-size: 1.1rem; margin-bottom: 8px; }
        .muscle-main-name { font-size: 2.6rem; font-weight: 500; color: #fff; margin-bottom: 20px; letter-spacing: 6px; }
        
        .tags-row { display: flex; gap: 10px; justify-content: center; margin-bottom: 30px; flex-wrap: wrap; }
        .tag { background: #1a1a1a; padding: 5px 12px; font-size: 0.8rem; color: #666; border: 1px solid #333; }

        .diagram-box {
            background: #fff; padding: 25px; margin-bottom: 30px; border-radius: 2px;
            /* 改進濾鏡：讓白底變黑底金線 */
            filter: contrast(1.2) grayscale(1) invert(1) brightness(1.2);
            display: flex; justify-content: center; align-items: center; min-height: 250px;
        }
        .diagram-box img { max-width: 100%; height: auto; display: block; }

        .section-label { font-size: 0.8rem; color: var(--netter-red); border-bottom: 1px solid #333; padding-bottom: 8px; margin-bottom: 15px; letter-spacing: 2px; }
        .analysis-text { font-size: 1rem; color: #bbb; text-align: justify; margin-bottom: 30px; line-height: 1.8; }
        
        .grid-info { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 30px; }
        .info-card { background: #000; padding: 15px; border-top: 1px solid #333; }
        .info-label { font-size: 0.75rem; color: #555; margin-bottom: 6px; }
        .info-value { font-size: 0.95rem; color: #aaa; }

        .resonance-box { background: #1a1a1a; padding: 20px; border-left: 2px solid var(--gold); margin-bottom: 30px; }

        .card-footer { border-top: 1px solid #222; padding-top: 20px; text-align: center; font-size: 0.75rem; color: #444; letter-spacing: 3px; }

        .action-btns { margin-top: 40px; text-align: center; }
        .btn-restart { background: none; border: 1px solid #333; color: #666; padding: 12px 25px; cursor: pointer; font-size: 0.9rem; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(40px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="app">
    <div id="start-page">
        <h1>CARTOGRAPHY OF SINEW</h1>
        <div class="narrative">
            構造的質詢。我們剝落多餘的情感辭藻，直接審視決定你存在張力的纖維。<br>
            這是一份關於臨床座標的精確標註。
        </div>
        <button class="option-item" style="text-align:center" onclick="init()">開始製圖</button>
    </div>

    <div id="quiz-page" style="display:none;">
        <div class="narrative" id="q-narrative"></div>
        <div class="option-list" id="options"></div>
    </div>

    <div id="result-card">
        <div class="card-header">
            <div class="star-rating" id="res-stars"></div>
            <div class="muscle-latin" id="res-latin"></div>
            <div class="muscle-main-name" id="res-name"></div>
            <div class="tags-row" id="res-tags"></div>
        </div>
        
        <div class="diagram-box">
            <img id="res-img" src="" alt="Anatomical Plate">
        </div>

        <div class="section-label">臨床分析 / CLINICAL ANALYSIS</div>
        <div class="analysis-text" id="res-desc"></div>

        <div class="grid-info">
            <div class="info-card">
                <div class="info-label">結構強度 / STRENGTH</div>
                <div class="info-value" id="res-strength"></div>
            </div>
            <div class="info-card">
                <div class="info-label">脆弱座標 / VULNERABILITY</div>
                <div class="info-value" id="res-weakness"></div>
            </div>
        </div>

        <div class="section-label">理想共振 / RESONANCE</div>
        <div class="resonance-box">
            <div id="res-pair" style="color:var(--gold); font-size:1rem; margin-bottom:8px;"></div>
            <div id="res-pair-desc" style="font-size:0.9rem; color:#888;"></div>
        </div>

        <div class="card-footer">
            CODE: <span id="res-code"></span> | 臨床製圖術
        </div>
    </div>

    <div class="action-btns" id="footer-btns" style="display:none;">
        <button class="btn-restart" onclick="location.reload()">重新製圖</button>
    </div>
</div>

<script>
    const questions = [
        {
            n: "清晨時分，你步入一座荒廢已久的植物園。在層疊的綠意中，你的注意力會停留在哪裡？",
            options: [
                { t: "支撐整座溫室、已與老藤合為一體的鏽蝕鐵柱", s: {G:1, T:1} },
                { t: "葉片邊緣懸而未落、映照微光的晶瑩晨露", s: {F:1, E:1} },
                { t: "空氣中微弱的、隨呼吸起伏的泥土濕潤感", s: {O:1, N:1} },
                { t: "遠處穿過枝葉縫隙、不斷移動的斑駁光影", s: {R:1, Q:1} }
            ]
        },
        {
            n: "你正在修復一件脆弱的古物。面對最細微的裂縫，你傾向於如何處理？",
            options: [
                { t: "以絕對的沈穩壓制震顫，確保每一次觸碰都精準無誤", s: {W:1, F:1} },
                { t: "放鬆指尖，順應材質原有的紋理進行修補", s: {N:1, F:1} },
                { t: "從大處著眼，先穩固整體的力學支點", s: {G:1, T:1} },
                { t: "在修復的過程中，不經意地加入一抹獨特的裝飾", s: {D:1, R:1} }
            ]
        },
        {
            n: "你獨自穿越一片無邊的鹽原。天際線平坦得令人不安，此時你會？",
            options: [
                { t: "加快步伐，感受肌肉爆發帶來的推進感", s: {Q:1, R:1} },
                { t: "紮實地踏下每一步，確認自己與大地的聯繫", s: {T:1, G:1} },
                { t: "閉上眼，轉而傾聽胸腔內傳出的、穩定的迴聲", s: {O:1, E:1} },
                { t: "停下來環顧四周，尋找這片荒蕪中的視覺規律", s: {D:1, F:1} }
            ]
        },
        {
            n: "山谷間突然起了一場沒來由的藍色大霧。在這股涼意中，你下意識的動作是？",
            options: [
                { t: "收緊核心，等待這股未知的觸碰滲入皮膚", s: {O:1, W:1} },
                { t: "伸出手掌試圖抓握霧氣，感受其細微的流動", s: {R:1, F:1} },
                { t: "維持原有的步行節奏，不受突發異象的干擾", s: {T:1, N:1} },
                { t: "挺起脊樑，在模糊的視野中尋找新的高度", s: {G:1, D:1} }
            ]
        },
        {
            n: "如果要為你的生命留下一份診斷筆記，你希望它如何被總結？",
            options: [
                { t: "一處永不動搖的核心支撐", s: {T:1, E:1, O:1} },
                { t: "一段充滿張力與變革的弧線", s: {Q:1, D:1, R:1} },
                { t: "一種在沈默中持續運作的本能", s: {N:1, E:1, G:1} },
                { t: "一個極其細緻、難以被察覺的轉捩點", s: {W:1, F:1, O:1} }
            ]
        }
    ];

    const results = {
        "GOTEN": { n: "橫膈膜", l: "Diaphragma", s: "★", tags: ["生命屏障", "隱形主宰"], d: "你是生命存在的前提。在宏大的起伏中，你調和了內部與外部的壓力。你不需要被看見，因為你就是世界運行的底噪。你的力量源於最深沉的本能。", strength: "極高的情緒包容度與耐力", weakness: "容易因外界的混亂而失去原有的節奏", pair: "心肌", pair_desc: "只有恆久的搏動能與你的呼吸共鳴。", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/c/c5/Diaphragm_-_front_view.png/400px-Diaphragm_-_front_view.png" },
        "FQRDW": { n: "球海綿體肌", l: "M. bulbospongiosus", s: "★★★★★", tags: ["瞬時迸發", "生命閾值"], d: "你是極致的意志爆發力。你主宰著生命湧現的瞬間，負責將長期累積的張力轉化為決定性的跨越。你是沈默後的驚雷，也是繁衍的火花。", strength: "無與倫比的集中執行力", weakness: "對平庸與漫長的日常耐受性較低", pair: "睫狀肌", pair_desc: "精準的視覺引導你將能量精準投射。", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/5/52/Gray1205.png/400px-Gray1205.png" },
        "FOTDW": { n: "錐狀肌", l: "M. pyramidalis", s: "★★★★", tags: ["優雅贅餘", "演化遺留"], d: "你證明了並非所有組織都需要「功能」來定義價值。你是一種純粹的姿態，是那些微小、精緻且不具功利性的美的守護者。你雖然微小，卻讓你與眾不同。", strength: "獨特的審美敏感度與直覺", weakness: "在過於現實主義的環境中會感到格格不入", pair: "鐙骨肌", pair_desc: "兩份細微的靈魂守護世界的寧靜。", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/a/aa/Pyramidalis.png/400px-Pyramidalis.png" },
        "FORDW": { n: "鐙骨肌", l: "M. stapedius", s: "★★★★★", tags: ["極致克制", "沈默守衛"], d: "你是全身上下最小的肌肉。在萬籟俱寂與震耳欲聾之間，你用微米級的收縮維持靈魂的平衡。你是極致的專注，守護著通往內在最後的防線。", strength: "極強的環境覺察力與自律", weakness: "過度的敏感有時會導致神經性疲憊", pair: "錐狀肌", pair_desc: "在幽微的角落尋得共鳴。", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/4b/Gray919.png/400px-Gray919.png" },
        "GOTEW": { n: "髂尾肌", l: "M. iliococcygeus", s: "★★★", tags: ["深層支撐", "無名基石"], d: "你是骨盆底的守護者。在最深處的核心，你支撐著靈魂的重擔。你沈穩且不張揚，在安靜中對抗著地心引力，維持整體的穩定。", strength: "卓越的耐受力與基礎穩固性", weakness: "習慣性承擔，容易在壓力下產生隱形勞損", pair: "橫膈膜", pair_desc: "上下呼應，維持軀幹的空靈與彈性。", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/4/44/Pelvis_diagram.png/400px-Pelvis_diagram.png" }
        // 更多結果可按此格式補充...
    };

    let userScores = { G:0, F:0, O:0, R:0, T:0, Q:0, E:0, D:0, N:0, W:0 };
    let step = 0;

    function init() {
        document.getElementById('start-page').style.display = 'none';
        document.getElementById('quiz-page').style.display = 'block';
        showQuestion();
    }

    function showQuestion() {
        if (step >= questions.length) { renderResult(); return; }
        const q = questions[step];
        document.getElementById('q-narrative').innerText = q.n;
        const list = document.getElementById('options');
        list.innerHTML = '';
        q.options.forEach(o => {
            const btn = document.createElement('button');
            btn.className = 'option-item';
            btn.innerText = o.t;
            btn.onclick = () => {
                for(let k in o.s) userScores[k] += o.s[k];
                step++;
                showQuestion();
            };
            list.appendChild(btn);
        });
    }

    function renderResult() {
        document.getElementById('quiz-page').style.display = 'none';
        document.getElementById('result-card').style.display = 'block';
        document.getElementById('footer-btns').style.display = 'block';

        let code = "";
        code += (userScores.G >= userScores.F) ? "G" : "F";
        code += (userScores.O >= userScores.R) ? "O" : "R";
        code += (userScores.T >= userScores.Q) ? "T" : "Q";
        code += (userScores.E >= userScores.D) ? "E" : "D";
        code += (userScores.N >= userScores.W) ? "N" : "W";

        const res = results[code] || results["GOTEN"]; 
        
        document.getElementById('res-stars').innerText = res.s;
        document.getElementById('res-name').innerText = res.n;
        document.getElementById('res-latin').innerText = res.l;
        document.getElementById('res-desc').innerText = res.d;
        document.getElementById('res-img').src = res.img;
        document.getElementById('res-code').innerText = code;
        document.getElementById('res-strength').innerText = res.strength;
        document.getElementById('res-weakness').innerText = res.weakness;
        document.getElementById('res-pair').innerText = res.pair;
        document.getElementById('res-pair-desc').innerText = res.pair_desc;

        const tagsBox = document.getElementById('res-tags');
        tagsBox.innerHTML = '';
        res.tags.forEach(t => {
            const span = document.createElement('span');
            span.className = 'tag';
            span.innerText = "#" + t;
            tagsBox.appendChild(span);
        });
    }
</script>
</body>
</html>
